name: TV3 Live Watch & Auto Fetch on Failure
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch new TV3 source with proper headers
        run: |
          PAGE_URL="https://malaysia-tv.net/tv3-live/"
          # 完整模拟浏览器请求，避免被拦截
          new_url=$(curl -s -L \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8" \
            -H "Accept-Language: en-US,en;q=0.5" \
            -H "Referer: https://malaysia-tv.net/" \
            "$PAGE_URL" | grep -oE 'https?://[^"]+\.(m3u8|mpd)' | head -1)
          echo "$new_url" > new_tv3.txt
          echo "✅ Found new TV3 source: $new_url"

      - name: Generate new TV3 M3U
        run: |
          echo "#EXTM3U" > tv3.m3u
          echo "#EXTINF:-1,TV3 Malaysia Live" >> tv3.m3u
          cat new_tv3.txt >> tv3.m3u
          echo "✅ Generated new tv3.m3u"

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update TV3 live source (fixed extraction)"
          file_pattern: tv3.m3u
