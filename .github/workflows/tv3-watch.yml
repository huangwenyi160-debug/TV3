name: TV3 Live Watch & Auto Fetch on Failure
on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟检查一次
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1. 检查当前 tv3.m3u 里的源是否有效
      - name: Check if current TV3 source is valid
        id: check_valid
        run: |
          if [ ! -f tv3.m3u ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ No tv3.m3u found, will fetch initial source."
            exit 0
          fi
          current_url=$(grep -E '^https?://' tv3.m3u | head -1)
          if [ -z "$current_url" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          http_code=$(curl -s -f -r 0-1024 "$current_url" -o /dev/null -w "%{http_code}" || echo "000")
          if echo "$http_code" | grep -qE '200|206'; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
            echo "✅ TV3 source is valid: $current_url"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ TV3 source invalid! Will fetch new one."
          fi

      # 2. 抓取新的 TV3 源（首次运行也会执行）
      - name: Fetch new TV3 source
        run: |
          PAGE_URL="https://malaysia-tv.net/tv3-live/"
          # 增加 User-Agent 模拟浏览器，避免被网站拦截
          new_url=$(curl -s -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" "$PAGE_URL" | grep -oE 'https?://[^"]+\.m3u8' | head -1)
          echo "$new_url" > new_tv3.txt
          echo "✅ Found new TV3 source: $new_url"

      # 3. 生成新的 M3U 文件
      - name: Generate new TV3 M3U
        run: |
          echo "#EXTM3U" > tv3.m3u
          echo "#EXTINF:-1,TV3 Malaysia Live" >> tv3.m3u
          cat new_tv3.txt >> tv3.m3u
          echo "✅ Generated new tv3.m3u"

      # 4. 自动提交更新
      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update TV3 live source"
          file_pattern: tv3.m3u
